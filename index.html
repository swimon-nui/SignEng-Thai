<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature PRO Hybrid - TH/EN Equal Size</title>

<style>
:root{
    --frame-width:1134px;
    --frame-height:284px;
}
*{ box-sizing:border-box; }
body {
    font-family: sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:24px 12px 40px;
}
.stack {
    display:flex;
    flex-direction:column;
    gap:22px;
    width:fit-content;
    max-width:100%;
    margin:auto;
}
.card {
    background:#fff;
    padding:15px;
    border-radius:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.08);
    width:calc(var(--frame-width) + 30px);
    max-width:100%;
}
.canvas-wrap{
    width:var(--frame-width);
    max-width:100%;
    overflow:auto;
    margin:8px auto 0;
}
canvas {
    border:1px solid #ccc;
    background:#fff;
    touch-action:none;
    display:block;
    width:var(--frame-width);
    height:var(--frame-height);
}
button {
    padding:6px 10px;
    margin:10px 5px 0;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}
.save{background:green;color:white;}
.clear{background:gray;color:white;}
.note{
    color:#555;
    font-size:14px;
    margin:6px 0 18px;
}
</style>
</head>

<body>

<h2>Signature PRO Hybrid (600 DPI)</h2>
<div class="note">กรอบเขียนและไฟล์ที่บันทึกมี: 1134×284 px, 600 DPI</div>
<div style="margin:20px;">
    <input id="filename" placeholder="ตั้งชื่อไฟล์..."
        style="
            width:90%;
            max-width:700px;
            padding:18px 22px;
            font-size:24px;
            border-radius:14px;
            border:2px solid #888;
            text-align:center;
            outline:none;
        ">
</div>
<div class="stack" id="grid"></div>

<script>
const exportWidth = 1134;
const exportHeight = 284;
const exportDpi = 600;
const maxStrokeWidth = 12; // เส้นหนาสุด 17-15px

const grid = document.getElementById("grid");
const pads = [];

// ===== CREATE PAD =====
function createPad(index, label, suffix){

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
        <b>${label}</b>
        <div class="canvas-wrap">
            <canvas id="c${index}" width="${exportWidth}" height="${exportHeight}"></canvas>
        </div>
        <div>
            <button class="clear" onclick="clearPad(${index})">Clear</button>
            <button class="save" onclick="save(${index})">Save</button>
        </div>
    `;

    grid.appendChild(div);

    const canvas = document.getElementById(`c${index}`);
    const ctx = canvas.getContext("2d");

    let drawing = false;
    let last = null;
    let points = [];
    let lastVelocity = 0;

    function getPos(e){
        const rect = canvas.getBoundingClientRect();
        return {
            x:(e.clientX-rect.left)*(canvas.width/rect.width),
            y:(e.clientY-rect.top)*(canvas.height/rect.height),
            pressure:(e.pressure && e.pressure>0)?e.pressure:0.5,
            t:Date.now()
        };
    }

    function getVelocity(p1,p2){
        const dx=p2.x-p1.x;
        const dy=p2.y-p1.y;
        const dt=p2.t-p1.t;
        return Math.sqrt(dx*dx+dy*dy)/(dt||1);
    }

    canvas.addEventListener("pointerdown",e=>{
        e.preventDefault();
        drawing=true;
        points=[];
        last=getPos(e);
        points.push(last);
        canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener("pointermove",e=>{
        e.preventDefault();
        if(!drawing) return;

        const pos=getPos(e);
        const isPen = e.pointerType==="pen";

        if(isPen){
            // ===== Pencil / Stylus =====
            const velocity=getVelocity(last,pos);
            const smoothV=0.7*velocity+0.3*lastVelocity;

            const width = Math.min(
                maxStrokeWidth,
                Math.max(1.5, maxStrokeWidth / (smoothV + 1)) * (pos.pressure || 1)
            );

            const mid={
                x:(last.x+pos.x)/2,
                y:(last.y+pos.y)/2
            };

            ctx.lineWidth=width;
            ctx.lineCap="round";
            ctx.lineJoin="round";

            ctx.beginPath();
            ctx.moveTo(last.x,last.y);
            ctx.quadraticCurveTo(last.x,last.y,mid.x,mid.y);
            ctx.stroke();

            lastVelocity=smoothV;

        }else{
            // ===== Mouse / Touch =====
            const dx=pos.x-last.x;
            const dy=pos.y-last.y;
            const dist=Math.sqrt(dx*dx+dy*dy);

            const step=2;
            const steps=Math.max(1,Math.floor(dist/step));

            for(let i=1;i<=steps;i++){
                const p={
                    x:last.x+(dx*i/steps),
                    y:last.y+(dy*i/steps),
                    pressure:pos.pressure
                };

                points.push(p);

                if(points.length>=3){
                    const p0=points[points.length-3];
                    const p1=points[points.length-2];
                    const p2=points[points.length-1];

                    const mid1={
                        x:(p0.x+p1.x)/2,
                        y:(p0.y+p1.y)/2
                    };

                    const mid2={
                        x:(p1.x+p2.x)/2,
                        y:(p1.y+p2.y)/2
                    };

                    const velocity = Math.sqrt(dx*dx+dy*dy);
                    const minWidth = 3;
                    const width = Math.min(
                        maxStrokeWidth,
                        Math.max(minWidth, maxStrokeWidth - velocity * 0.08)
                    );

                    ctx.lineWidth=width;
                    ctx.lineCap="round";
                    ctx.lineJoin="round";

                    ctx.beginPath();
                    ctx.moveTo(mid1.x,mid1.y);
                    ctx.quadraticCurveTo(p1.x,p1.y,mid2.x,mid2.y);
                    ctx.stroke();
                }
            }
        }

        last=pos;
    });

    function stop(e){
        if(!drawing) return;
        drawing=false;

        if(points.length>0){
            const p=points[points.length-1];
            ctx.beginPath();
            ctx.arc(p.x,p.y,Math.min(ctx.lineWidth, maxStrokeWidth)/2,0,Math.PI*2);
            ctx.fill();
        }

        points=[];
        try{canvas.releasePointerCapture(e.pointerId);}catch{}
    }

    canvas.addEventListener("pointerup",stop);
    canvas.addEventListener("pointerleave",stop);
    canvas.addEventListener("pointercancel",stop);

    pads[index]={
        canvas,
        ctx,
        suffix,
        clear:()=>ctx.clearRect(0,0,exportWidth,exportHeight)
    };
}

// ===== ONLY TWO FRAMES =====
createPad(0,"ลายเซ็นภาษาไทย","TH");
createPad(1,"Signature English","EN");

// ===== DPI =====
function changeDpiBlob(blob,dpi){
    return new Promise(res=>{
        const r=new FileReader();
        r.onload=()=>{
            const bytes=new Uint8Array(r.result);
            const dpm=Math.round(dpi/0.0254);

            const chunk=new Uint8Array([
                0,0,0,9,112,72,89,115,
                dpm>>>24&255,dpm>>>16&255,dpm>>>8&255,dpm&255,
                dpm>>>24&255,dpm>>>16&255,dpm>>>8&255,dpm&255,
                1
            ]);

            const crcTable = (()=>{
                let c, table=[];
                for(let n=0;n<256;n++){
                    c=n;
                    for(let k=0;k<8;k++) c=((c&1)?(0xedb88320^(c>>>1)):(c>>>1));
                    table[n]=c>>>0;
                }
                return table;
            })();

            function crc32(data){
                let crc=0xffffffff;
                for(let i=4;i<data.length;i++) crc=crcTable[(crc^data[i])&0xff]^(crc>>>8);
                return (crc^0xffffffff)>>>0;
            }

            const crc=crc32(chunk);
            const pHYs=new Uint8Array(21);
            pHYs.set(chunk,0);
            pHYs[17]=crc>>>24&255;
            pHYs[18]=crc>>>16&255;
            pHYs[19]=crc>>>8&255;
            pHYs[20]=crc&255;

            // Insert pHYs after PNG signature + IHDR chunk (33 bytes)
            const out=new Uint8Array(bytes.length+21);
            out.set(bytes.subarray(0,33),0);
            out.set(pHYs,33);
            out.set(bytes.subarray(33),54);

            res(new Blob([out],{type:"image/png"}));
        };
        r.readAsArrayBuffer(blob);
    });
}

// ===== SAVE CENTERED IN IMAGE =====
function getDrawingBounds(canvas){
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = img.data;

    let minX = canvas.width;
    let minY = canvas.height;
    let maxX = -1;
    let maxY = -1;

    // หาเฉพาะพิกเซลที่มีการเขียนจริง โดยดูจากค่า alpha
    for(let y = 0; y < canvas.height; y++){
        for(let x = 0; x < canvas.width; x++){
            const a = data[(y * canvas.width + x) * 4 + 3];
            if(a > 0){
                if(x < minX) minX = x;
                if(y < minY) minY = y;
                if(x > maxX) maxX = x;
                if(y > maxY) maxY = y;
            }
        }
    }

    if(maxX < 0 || maxY < 0) return null;

    return {
        x: minX,
        y: minY,
        width: maxX - minX + 1,
        height: maxY - minY + 1
    };
}

function makeCenteredCanvas(sourceCanvas){
    const out = document.createElement("canvas");
    out.width = exportWidth;
    out.height = exportHeight;

    const outCtx = out.getContext("2d");
    const bounds = getDrawingBounds(sourceCanvas);

    // ถ้ายังไม่ได้เขียนอะไร ให้บันทึกภาพเปล่าขนาดเดิม
    if(!bounds) return out;

    // เพิ่มขอบเล็กน้อยเพื่อไม่ให้เส้นถูกตัด
    const padding = Math.ceil(maxStrokeWidth / 2) + 2;
    const sx = Math.max(0, bounds.x - padding);
    const sy = Math.max(0, bounds.y - padding);
    const sw = Math.min(sourceCanvas.width - sx, bounds.width + padding * 2);
    const sh = Math.min(sourceCanvas.height - sy, bounds.height + padding * 2);

    // วางสิ่งที่เขียนไว้กึ่งกลางของรูป โดยยังคงขนาดเดิม ไม่ย่อ/ขยาย
    const dx = Math.round((exportWidth - sw) / 2);
    const dy = Math.round((exportHeight - sh) / 2);

    outCtx.drawImage(sourceCanvas, sx, sy, sw, sh, dx, dy, sw, sh);
    return out;
}

function save(i){
    const pad = pads[i];
    const filenameInput = document.getElementById("filename").value.trim();

    const centeredCanvas = makeCenteredCanvas(pad.canvas);

    centeredCanvas.toBlob(async blob=>{
        const dpiBlob = await changeDpiBlob(blob,exportDpi);
        const url = URL.createObjectURL(dpiBlob);

        const a = document.createElement("a");
        a.href = url;

        let name = filenameInput || "signature";
        name = name.replace(/[\\/:*?"<>|]/g, "");

        a.download = `${name}_${pad.suffix}.png`;

        a.click();
        URL.revokeObjectURL(url);
    });
}

// ===== GLOBAL =====
function clearPad(i){ pads[i].clear(); }
</script>

</body>
</html>
